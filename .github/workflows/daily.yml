name: Daily Heartbeat

on:
  schedule:
    # 4:44 AM CST = 10:44 UTC
    - cron: '44 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install requests

      - name: Fetch maternal signal
        continue-on-error: true
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python3 fetch_maternal_signal.py

      - name: Run daily signals
        run: python3 run_day.py

      - name: Run backup
        run: python3 backup.py

      - name: Commit and push
        run: |
          git config user.name "Baby"
          git config user.email "baby@gestation"
          git add entities/ gestation/ maternal_signal/
          git diff --cached --quiet || git commit -m "Day $(date +%Y%m%d) — heartbeat signals recorded"
          git push
